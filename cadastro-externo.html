    <script>
        let fotoBase64 = null;

        // Processar foto
        window.processarFoto = function(input) {
            const file = input.files[0];
            if (!file) return;

            // Validar tipo
            if (!file.type.startsWith('image/')) {
                mostrarMensagem('Por favor, selecione uma imagem válida', 'error');
                return;
            }

            // Validar tamanho (2MB)
            if (file.size > 2 * 1024 * 1024) {
                mostrarMensagem('A imagem deve ter no máximo 2MB', 'error');
                return;
            }

            // Mostrar loading
            document.getElementById('photoLoading').style.display = 'flex';

            const reader = new FileReader();
            reader.onload = function(e) {
                // Redimensionar imagem para 300x400 (3x4)
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    canvas.width = 300;
                    canvas.height = 400;
                    
                    const ctx = canvas.getContext('2d');
                    
                    // Preencher fundo branco
                    ctx.fillStyle = '#FFFFFF';
                    ctx.fillRect(0, 0, 300, 400);
                    
                    // Calcular posição para centralizar
                    const scale = Math.max(300 / img.width, 400 / img.height);
                    const x = (300 - img.width * scale) / 2;
                    const y = (400 - img.height * scale) / 2;
                    
                    ctx.drawImage(img, x, y, img.width * scale, img.height * scale);
                    
                    // Converter para base64
                    fotoBase64 = canvas.toDataURL('image/jpeg', 0.8);
                    
                    // Mostrar preview
                    document.getElementById('photoPreview').src = fotoBase64;
                    document.getElementById('photoPreview').style.display = 'block';
                    document.getElementById('photoPlaceholder').style.display = 'none';
                    document.getElementById('removerFotoBtn').style.display = 'block';
                    
                    // Esconder loading
                    document.getElementById('photoLoading').style.display = 'none';
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        };

        // Remover foto
        window.removerFoto = function() {
            fotoBase64 = null;
            document.getElementById('photoPreview').src = '';
            document.getElementById('photoPreview').style.display = 'none';
            document.getElementById('photoPlaceholder').style.display = 'flex';
            document.getElementById('removerFotoBtn').style.display = 'none';
            document.getElementById('fotoInput').value = '';
        };

        // Formatar CPF
        window.formatarCPF = function(input) {
            let value = input.value.replace(/\D/g, '');
            if (value.length > 11) value = value.slice(0, 11);
            
            if (value.length > 9) {
                value = value.replace(/^(\d{3})(\d{3})(\d{3})(\d{2})$/, '$1.$2.$3-$4');
            } else if (value.length > 6) {
                value = value.replace(/^(\d{3})(\d{3})(\d{0,3})$/, '$1.$2.$3');
            } else if (value.length > 3) {
                value = value.replace(/^(\d{3})(\d{0,3})$/, '$1.$2');
            }
            
            input.value = value;
        };

        // Formatar Telefone
        window.formatarTelefone = function(input) {
            let value = input.value.replace(/\D/g, '');
            if (value.length > 11) value = value.slice(0, 11);
            
            if (value.length > 10) {
                value = value.replace(/^(\d{2})(\d{5})(\d{4})$/, '($1) $2-$3');
            } else if (value.length > 6) {
                value = value.replace(/^(\d{2})(\d{4})(\d{0,4})$/, '($1) $2-$3');
            } else if (value.length > 2) {
                value = value.replace(/^(\d{2})(\d{0,5})$/, '($1) $2');
            }
            
            input.value = value;
        };

        // Formatar CEP
        window.formatarCEP = function(input) {
            let value = input.value.replace(/\D/g, '');
            if (value.length > 8) value = value.slice(0, 8);
            
            if (value.length > 5) {
                value = value.replace(/^(\d{5})(\d{3})$/, '$1-$2');
            }
            
            input.value = value;
        };

        // Validar CPF
        function validarCPF(cpf) {
            cpf = cpf.replace(/\D/g, '');
            
            if (cpf.length !== 11) return false;
            if (/^(\d)\1+$/.test(cpf)) return false;
            
            // Validação do primeiro dígito
            let soma = 0;
            for (let i = 0; i < 9; i++) {
                soma += parseInt(cpf.charAt(i)) * (10 - i);
            }
            let resto = (soma * 10) % 11;
            if (resto === 10 || resto === 11) resto = 0;
            if (resto !== parseInt(cpf.charAt(9))) return false;
            
            // Validação do segundo dígito
            soma = 0;
            for (let i = 0; i < 10; i++) {
                soma += parseInt(cpf.charAt(i)) * (11 - i);
            }
            resto = (soma * 10) % 11;
            if (resto === 10 || resto === 11) resto = 0;
            if (resto !== parseInt(cpf.charAt(10))) return false;
            
            return true;
        }

        // Validar email
        function validarEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        // Mostrar mensagem
        function mostrarMensagem(texto, tipo) {
            const msgDiv = document.getElementById('messageBox');
            msgDiv.textContent = texto;
            msgDiv.className = 'message ' + tipo;
            msgDiv.style.display = 'block';
            
            setTimeout(() => {
                msgDiv.style.display = 'none';
            }, 5000);
        }

        // Enviar solicitação
        window.enviarSolicitacao = async function() {
            // Validar campos obrigatórios
            const nome = document.getElementById('nome').value.trim();
            const dataNascimento = document.getElementById('dataNascimento').value;
            const cpf = document.getElementById('cpf').value.replace(/\D/g, '');
            const email = document.getElementById('email').value.trim();
            const telefone = document.getElementById('telefone').value;
            const termos = document.getElementById('termos').checked;

            if (!nome) {
                mostrarMensagem('Por favor, preencha seu nome completo', 'error');
                return;
            }

            if (!dataNascimento) {
                mostrarMensagem('Por favor, informe sua data de nascimento', 'error');
                return;
            }

            if (!cpf || !validarCPF(cpf)) {
                mostrarMensagem('CPF inválido', 'error');
                return;
            }

            if (!email || !validarEmail(email)) {
                mostrarMensagem('Email inválido', 'error');
                return;
            }

            if (!telefone || telefone.replace(/\D/g, '').length < 10) {
                mostrarMensagem('Telefone inválido', 'error');
                return;
            }

            if (!termos) {
                mostrarMensagem('Você deve aceitar os termos para continuar', 'error');
                return;
            }

            // Desabilitar botão
            const btn = document.getElementById('btnEnviar');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner" style="display: inline-block; width: 20px; height: 20px; margin-right: 10px;"></span> Enviando...';

            try {
                // Verificar se já existe solicitação pendente com este CPF ou email
                const solicitacoesRef = collection(window.db, "solicitacoes_cadastro");
                
                // Verificar CPF
                const qCpf = query(solicitacoesRef, where("cpf", "==", cpf));
                const cpfSnapshot = await getDocs(qCpf);
                
                if (!cpfSnapshot.empty) {
                    const solicitacaoExistente = cpfSnapshot.docs[0].data();
                    if (solicitacaoExistente.status === 'pendente') {
                        mostrarMensagem('Já existe uma solicitação pendente com este CPF. Aguarde a análise.', 'info');
                        btn.disabled = false;
                        btn.innerHTML = 'Enviar Solicitação de Cadastro';
                        return;
                    }
                }
                
                // Verificar email
                const qEmail = query(solicitacoesRef, where("email", "==", email));
                const emailSnapshot = await getDocs(qEmail);
                
                if (!emailSnapshot.empty) {
                    const solicitacaoExistente = emailSnapshot.docs[0].data();
                    if (solicitacaoExistente.status === 'pendente') {
                        mostrarMensagem('Já existe uma solicitação pendente com este email. Aguarde a análise.', 'info');
                        btn.disabled = false;
                        btn.innerHTML = 'Enviar Solicitação de Cadastro';
                        return;
                    }
                }

                // Verificar se já é membro
                const membrosRef = collection(window.db, "membros");
                const qMembroCpf = query(membrosRef, where("cpf", "==", cpf));
                const membroCpfSnapshot = await getDocs(qMembroCpf);
                
                if (!membroCpfSnapshot.empty) {
                    mostrarMensagem('Você já é membro da igreja! Faça login com seu CPF e data de nascimento.', 'info');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 3000);
                    return;
                }

                // Preparar dados da solicitação
                const dadosSolicitacao = {
                    nome: nome,
                    apelido: document.getElementById('apelido').value.trim(),
                    dataNascimento: dataNascimento,
                    cpf: cpf,
                    estadoCivil: document.getElementById('estadoCivil').value,
                    email: email,
                    telefone: telefone.replace(/\D/g, ''),
                    profissao: document.getElementById('profissao').value.trim(),
                    endereco: document.getElementById('endereco').value.trim(),
                    bairro: document.getElementById('bairro').value.trim(),
                    cidade: document.getElementById('cidade').value.trim(),
                    estado: document.getElementById('estado').value,
                    cep: document.getElementById('cep').value.replace(/\D/g, ''),
                    dataConversao: document.getElementById('dataConversao').value,
                    dataBatismo: document.getElementById('dataBatismo').value,
                    ministerio: document.getElementById('ministerio').value,
                    observacoes: document.getElementById('observacoes').value.trim(),
                    foto: fotoBase64 || null,
                    status: 'pendente',
                    dataSolicitacao: new Date().toISOString(),
                    origem: 'cadastro_externo'
                };

                // Salvar no Firebase
                const docRef = await addDoc(collection(window.db, "solicitacoes_cadastro"), dadosSolicitacao);
                
                console.log('Solicitação enviada com ID:', docRef.id);
                
                // Mostrar mensagem de sucesso
                mostrarMensagem('✅ Solicitação enviada com sucesso! Aguarde a análise da secretaria.', 'success');
                
                // Limpar formulário
                document.getElementById('cadastroForm').reset();
                removerFoto();
                
                // Redirecionar após 3 segundos
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 3000);

            } catch (error) {
                console.error('Erro ao enviar solicitação:', error);
                mostrarMensagem('Erro ao enviar solicitação: ' + error.message, 'error');
                btn.disabled = false;
                btn.innerHTML = 'Enviar Solicitação de Cadastro';
            }
        };

        // Prevenir envio do form com Enter
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
