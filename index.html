<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>AdereVidas</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AdereVidas">
    <meta name="mobile-web-app-capable" content="yes">
    
    <!-- iOS Icons -->
    <link rel="apple-touch-icon" href="https://i.ibb.co/1G3ctD9b/logo-igreja.png">
    <link rel="apple-touch-icon" sizes="152x152" href="https://i.ibb.co/1G3ctD9b/logo-igreja.png">
    <link rel="apple-touch-icon" sizes="180x180" href="https://i.ibb.co/1G3ctD9b/logo-igreja.png">
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyD4PNzTUJ1mA3QgrxJDL8vYuzHMBhrhI04",
            authDomain: "aderevidas-da996.firebaseapp.com",
            projectId: "aderevidas-da996",
            storageBucket: "aderevidas-da996.firebasestorage.app",
            messagingSenderId: "671945975313",
            appId: "1:671945975313:web:b7d3a1b4e78c5d5a8fb3b0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        window.db = db;
        window.collection = collection;
        window.query = query;
        window.where = where;
        window.getDocs = getDocs;
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #2c3e50, #3498db);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        .login-container {
            background: white;
            border-radius: 30px;
            padding: 40px 25px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            animation: slideUp 0.5s ease;
            position: relative;
            z-index: 2;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo img {
            width: 100px;
            height: 100px;
            border-radius: 20px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .logo h1 {
            color: #2c3e50;
            font-size: 28px;
            margin-bottom: 5px;
        }

        .logo p {
            color: #7f8c8d;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #34495e;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52,152,219,0.1);
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #3498db, #2c3e50);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(52,152,219,0.3);
        }

        .btn-login:disabled {
            opacity: 0.7;
            transform: none;
            cursor: not-allowed;
        }

        .message {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .message.error {
            background: #fee;
            color: #c0392b;
            border: 1px solid #fcc;
            display: block;
        }

        .message.success {
            background: #e8f8f5;
            color: #27ae60;
            border: 1px solid #b8e6d9;
            display: block;
        }

        .message.info {
            background: #e3f2fd;
            color: #1976d2;
            border: 1px solid #bbdefb;
            display: block;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #95a5a6;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top-color: #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* BOTÃO DE INSTALAÇÃO - AGORA NA TELA DE LOGIN */
        #installPrompt {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2ecc71;
            color: white;
            padding: 16px 32px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(46, 204, 113, 0.4);
            z-index: 10000;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: pulse 2s infinite;
            border: 2px solid white;
            transition: all 0.3s;
        }

        #installPrompt:hover {
            transform: translateX(-50%) scale(1.05);
            background: #27ae60;
            box-shadow: 0 15px 40px rgba(46, 204, 113, 0.6);
        }

        @keyframes pulse {
            0% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.05); }
            100% { transform: translateX(-50%) scale(1); }
        }

        .install-icon {
            font-size: 24px;
        }

        /* Badge de PWA */
        .pwa-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            z-index: 3;
        }

        /* Link de cadastro */
        .cadastro-link {
            text-align: center;
            margin-top: 20px;
        }

        .cadastro-link a {
            color: #3498db;
            text-decoration: none;
            font-size: 14px;
        }

        .cadastro-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="pwa-badge" id="pwaBadge">📱 App disponível</div>
    
    <div class="login-container">
        <div class="logo">
            <img src="https://i.ibb.co/1G3ctD9b/logo-igreja.png" alt="Logo AdereVidas">
            <h1>AdereVidas</h1>
            <p>App exclusivo para membros</p>
        </div>

        <div id="messageBox" class="message"></div>

        <div class="form-group">
            <label>📇 CPF (apenas números)</label>
            <input type="text" id="cpfInput" 
                   placeholder="00000000000" 
                   maxlength="11"
                   oninput="this.value = this.value.replace(/\D/g, '')">
        </div>

        <div class="form-group">
            <label>🎂 Data de Nascimento</label>
            <input type="text" id="dataInput" 
                   placeholder="DDMMAAAA" 
                   maxlength="8"
                   oninput="this.value = this.value.replace(/\D/g, '')">
        </div>

        <button class="btn-login" id="loginBtn" onclick="fazerLogin()">
            Entrar no App
        </button>

        <div class="cadastro-link">
            <a href="cadastro-externo.html">Não tem cadastro? Cliqudddde aqui para solicitar</a>
        </div>

        <div class="footer">
            <p>AdereVidas © 2026 - Todos os direitos reservados</p>
        </div>
    </div>

    <!-- O BOTÃO DE INSTALAÇÃO APARECERÁ AQUI AUTOMATICAMENTE -->

    <script>
        // Verificar se já está logado
        (function() {
            const membroSalvo = localStorage.getItem('membroApp');
            if (membroSalvo) {
                window.location.href = 'app.html';
            }
        })();

        // ===== SISTEMA DE INSTALAÇÃO PWA =====
        let deferredPrompt;
        let installButton = null;

        // Detectar se pode ser instalado
        window.addEventListener('beforeinstallprompt', (e) => {
            console.log('📱 Pode instalar! (tela de login)');
            e.preventDefault();
            deferredPrompt = e;
            
            // Mostrar botão após 1 segundo
            setTimeout(showInstallButton, 1000);
        });

        // Detectar quando foi instalado
        window.addEventListener('appinstalled', (e) => {
            console.log('✅ App instalado!');
            deferredPrompt = null;
            hideInstallButton();
            
            // Mostrar mensagem de agradecimento
            showMessage('✅ App instalado com sucesso!', 'success');
        });

        // Mostrar botão de instalação
        function showInstallButton() {
            // Se já está instalado, não mostra
            if (window.matchMedia('(display-mode: standalone)').matches || 
                window.navigator.standalone === true) {
                console.log('📱 App já está instalado');
                document.getElementById('pwaBadge').innerHTML = '✅ App instalado';
                return;
            }
            
            // Se não tem prompt ou já existe botão, não cria
            if (!deferredPrompt || document.getElementById('installPrompt')) return;
            
            // Criar botão
            installButton = document.createElement('button');
            installButton.id = 'installPrompt';
            installButton.innerHTML = `
                <span class="install-icon">📲</span>
                INSTALAR APP
                <span style="font-size: 12px; background: rgba(255,255,255,0.2); padding: 4px 8px; border-radius: 20px;">gratuito</span>
            `;
            
            // Adicionar ao body
            document.body.appendChild(installButton);
            
            // Adicionar evento de clique
            installButton.addEventListener('click', installApp);
        }

        // Esconder botão de instalação
        function hideInstallButton() {
            const btn = document.getElementById('installPrompt');
            if (btn) btn.remove();
        }

        // Função de instalação
        function installApp() {
            if (!deferredPrompt) {
                alert('Para instalar, acesse o menu do navegador e escolha "Adicionar à tela inicial"');
                return;
            }
            
            deferredPrompt.prompt();
            
            deferredPrompt.userChoice.then((choiceResult) => {
                if (choiceResult.outcome === 'accepted') {
                    console.log('✅ Usuário aceitou instalar');
                    hideInstallButton();
                } else {
                    console.log('❌ Usuário recusou instalar');
                }
                deferredPrompt = null;
            });
        }

        // Mostrar mensagem
        function showMessage(text, type) {
            const msgBox = document.getElementById('messageBox');
            msgBox.textContent = text;
            msgBox.className = 'message ' + type;
            msgBox.style.display = 'block';
            
            setTimeout(() => {
                msgBox.style.display = 'none';
            }, 3000);
        }

        // ===== FUNÇÃO DE LOGIN =====
        window.fazerLogin = async function() {
            const cpf = document.getElementById('cpfInput').value;
            const dataNasc = document.getElementById('dataInput').value;
            const loginBtn = document.getElementById('loginBtn');
            const messageBox = document.getElementById('messageBox');

            if (!cpf || !dataNasc) {
                messageBox.className = 'message error';
                messageBox.textContent = 'Preencha CPF e Data de Nascimento';
                return;
            }

            if (cpf.length !== 11) {
                messageBox.className = 'message error';
                messageBox.textContent = 'CPF deve ter 11 dígitos';
                return;
            }

            if (dataNasc.length !== 8) {
                messageBox.className = 'message error';
                messageBox.textContent = 'Data deve ter 8 dígitos (DDMMAAAA)';
                return;
            }

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loading-spinner"></span> Verificando...';
            messageBox.className = 'message';

            try {
                // PRIMEIRO: Verificar se é membro
                const membrosRef = collection(window.db, "membros");
                const q = query(membrosRef, where("cpf", "==", cpf));
                const querySnapshot = await getDocs(q);
                
                if (!querySnapshot.empty) {
                    // Verificar data de nascimento
                    let membroEncontrado = null;
                    querySnapshot.forEach((doc) => {
                        const membro = { id: doc.id, ...doc.data() };
                        
                        if (membro.dataNascimento) {
                            const dataMembro = membro.dataNascimento.replace(/\D/g, '');
                            
                            if (membro.dataNascimento.includes('-')) {
                                const [ano, mes, dia] = membro.dataNascimento.split('-');
                                const dataFormatada = dia + mes + ano;
                                if (dataFormatada === dataNasc) {
                                    membroEncontrado = membro;
                                }
                            } else if (membro.dataNascimento.includes('/')) {
                                const [dia, mes, ano] = membro.dataNascimento.split('/');
                                const dataFormatada = dia + mes + ano;
                                if (dataFormatada === dataNasc) {
                                    membroEncontrado = membro;
                                }
                            } else if (dataMembro === dataNasc) {
                                membroEncontrado = membro;
                            }
                        }
                    });

                    if (membroEncontrado) {
                        // Login bem sucedido
                        const membroParaSalvar = {
                            id: membroEncontrado.id,
                            nome: membroEncontrado.nome || 'Membro',
                            email: membroEncontrado.email || '',
                            telefone: membroEncontrado.telefone || '',
                            dataNascimento: membroEncontrado.dataNascimento,
                            cpf: membroEncontrado.cpf
                        };
                        
                        localStorage.setItem('membroApp', JSON.stringify(membroParaSalvar));
                        
                        messageBox.className = 'message success';
                        messageBox.textContent = '✅ Login realizado! Redirecionando...';
                        
                        setTimeout(() => {
                            window.location.href = 'app.html';
                        }, 1000);
                        return;
                    } else {
                        messageBox.className = 'message error';
                        messageBox.textContent = '❌ Data de nascimento incorreta';
                        loginBtn.disabled = false;
                        loginBtn.innerHTML = 'Entrar no App';
                        return;
                    }
                }

                // SEGUNDO: Se não é membro, verificar solicitações
                const solicitacoesRef = collection(window.db, "solicitacoes_cadastro");
                const qSolicitacoes = query(solicitacoesRef, where("cpf", "==", cpf));
                const solicitacoesSnapshot = await getDocs(qSolicitacoes);
                
                if (!solicitacoesSnapshot.empty) {
                    let solicitacaoEncontrada = null;
                    solicitacoesSnapshot.forEach((doc) => {
                        const solicitacao = { id: doc.id, ...doc.data() };
                        
                        if (solicitacao.dataNascimento) {
                            const dataSolicitacao = solicitacao.dataNascimento.replace(/\D/g, '');
                            
                            if (solicitacao.dataNascimento.includes('-')) {
                                const [ano, mes, dia] = solicitacao.dataNascimento.split('-');
                                const dataFormatada = dia + mes + ano;
                                if (dataFormatada === dataNasc) {
                                    solicitacaoEncontrada = solicitacao;
                                }
                            } else if (dataSolicitacao === dataNasc) {
                                solicitacaoEncontrada = solicitacao;
                            }
                        }
                    });

                    if (solicitacaoEncontrada) {
                        const status = solicitacaoEncontrada.status;
                        const dataSolicitacao = new Date(solicitacaoEncontrada.dataSolicitacao).toLocaleDateString('pt-BR');
                        
                        if (status === 'pendente') {
                            messageBox.className = 'message info';
                            messageBox.innerHTML = `
                                <strong>⏳ Solicitação em análise</strong><br>
                                Enviada em ${dataSolicitacao}
                            `;
                        } else if (status === 'rejeitado') {
                            messageBox.className = 'message error';
                            messageBox.innerHTML = `
                                <strong>❌ Solicitação rejeitada</strong><br>
                                <a href="cadastro-externo.html" style="color: white;">Nova solicitação</a>
                            `;
                        }
                    } else {
                        messageBox.className = 'message error';
                        messageBox.textContent = '❌ Data de nascimento incorreta';
                    }
                } else {
                    messageBox.className = 'message info';
                    messageBox.innerHTML = `
                        <strong>📋 Não encontrado</strong><br>
                        <a href="cadastro-externo.html" style="color: white;">Solicitar cadastro</a>
                    `;
                }

                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Entrar no App';

            } catch (error) {
                console.error('Erro no login:', error);
                messageBox.className = 'message error';
                messageBox.textContent = '❌ Erro ao conectar. Tente novamente.';
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Entrar no App';
            }
        };

        // Permitir login com Enter
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                fazerLogin();
            }
        });

        // Verificar se já está instalado ao carregar
        window.addEventListener('load', function() {
            if (window.matchMedia('(display-mode: standalone)').matches || 
                window.navigator.standalone === true) {
                document.getElementById('pwaBadge').innerHTML = '✅ App instalado';
                console.log('📱 App rodando em modo standalone (login)');
            }
        });
    </script>
</body>
</html>
